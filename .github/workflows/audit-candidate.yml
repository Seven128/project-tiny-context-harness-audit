name: audit-candidate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      candidate_url:
        description: Immutable candidate tarball URL
        required: true
        type: string
      candidate_sha256:
        description: Exact candidate SHA-256
        required: true
        type: string
      candidate_commit:
        description: Main-repository commit receiving the required check
        required: true
        type: string
      linux_host_release_url:
        description: Immutable official Linux x64 Host release URL
        required: true
        type: string
      linux_host_release_sha256:
        description: Exact official Linux x64 Host release SHA-256
        required: true
        type: string
      windows_host_release_url:
        description: Immutable official Windows x64 Host release URL
        required: true
        type: string
      windows_host_release_sha256:
        description: Exact official Windows x64 Host release SHA-256
        required: true
        type: string

permissions:
  contents: read

jobs:
  self-test:
    name: external-audit-self-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout protected audit source
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm test
      - name: Verify protected workflow trust pins
        shell: bash
        run: |
          node --input-type=module - <<'NODE'
          import { readFileSync } from "node:fs";
          const source = readFileSync(".github/workflows/audit-candidate.yml", "utf8");
          for (const required of [
            "llvm-mingw-20260616-ucrt-x86_64.zip",
            "b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35",
            "docker run --rm --privileged",
            "ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90"
          ]) if (!source.includes(required)) throw new Error(`missing protected workflow pin: ${required}`);
          NODE

  audit:
    if: github.event_name == 'workflow_dispatch'
    name: audit-${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            binary_suffix: ""
          - os: windows-2025
            platform: windows
            binary_suffix: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout protected audit source
        uses: actions/checkout@v4
      - name: Checkout exact candidate source without credentials
        uses: actions/checkout@v4
        with:
          repository: Seven128/project-tiny-context-harness
          ref: ${{ inputs.candidate_commit }}
          path: candidate-source
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Provision an unprivileged candidate identity on Linux
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo useradd --system --no-create-home --shell /usr/sbin/nologin tycontextaudit
          echo "TY_CONTEXT_AUDIT_CANDIDATE_UID=$(id -u tycontextaudit)" >> "$GITHUB_ENV"
          echo "TY_CONTEXT_AUDIT_CANDIDATE_GID=$(id -g tycontextaudit)" >> "$GITHUB_ENV"
      - name: Provision an unprivileged candidate identity on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $user = "tycontextaudit"
          $password = "Tyc!" + [guid]::NewGuid().ToString("N") + "9a"
          net user $user $password /add /passwordchg:no /expires:never | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "failed to create standard candidate user" }
          "TY_CONTEXT_AUDIT_WINDOWS_USER=$user" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TY_CONTEXT_AUDIT_WINDOWS_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          icacls $env:GITHUB_WORKSPACE /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" "$user`:(OI)(CI)RX" /T /C | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "failed to protect audit workspace" }
      - name: Select declared Rust toolchain
        shell: pwsh
        run: |
          $rustupHome = Join-Path $env:RUNNER_TEMP "audit-rustup-home"
          $proxyRoot = Join-Path $env:RUNNER_TEMP "audit-rustup-proxy"
          New-Item -ItemType Directory -Force $rustupHome, $proxyRoot | Out-Null
          $env:RUSTUP_HOME = $rustupHome
          rustup toolchain install 1.97.0 --profile minimal
          rustup default 1.97.0
          $target = if ("${{ matrix.platform }}" -eq "windows") { "x86_64-pc-windows-gnullvm" } else { "x86_64-unknown-linux-gnu" }
          rustup target add $target --toolchain 1.97.0
          $proxyName = if ("${{ matrix.platform }}" -eq "windows") { "cargo.exe" } else { "cargo" }
          $cargoProxy = Join-Path $proxyRoot $proxyName
          node -e "const fs=require('node:fs');fs.copyFileSync(fs.realpathSync(process.argv[1]),process.argv[2]);" (Get-Command rustup).Source $cargoProxy
          if ($IsLinux) { chmod 755 $cargoProxy }
          "RUSTUP_HOME=$rustupHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TY_CONTEXT_AUDIT_CARGO_BIN=$cargoProxy" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "HOST_BUILD_TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Install integrity-pinned LLVM-MinGW
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/20260616/llvm-mingw-20260616-ucrt-x86_64.zip"
          $expected = "b9b68a4d276e16fa25802aaba458e4638f64b3884c290aaccdc2d87083b6ca35"
          $archive = Join-Path $env:RUNNER_TEMP "llvm-mingw-20260616-ucrt-x86_64.zip"
          $destination = Join-Path $env:RUNNER_TEMP "llvm-mingw"
          Invoke-WebRequest -Uri $url -OutFile $archive
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          if ($actual -ne $expected) { throw "LLVM-MinGW SHA-256 mismatch: $actual" }
          Expand-Archive -LiteralPath $archive -DestinationPath $destination
          $linker = Get-ChildItem -LiteralPath $destination -Recurse -Filter "x86_64-w64-mingw32-clang.exe" -File | Select-Object -ExpandProperty FullName -First 1
          if (-not $linker) { throw "LLVM-MinGW linker was not found after extraction" }
          "CARGO_TARGET_X86_64_PC_WINDOWS_GNULLVM_LINKER=$linker" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          (Split-Path -Parent $linker) | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Install audit dependencies and verify release package identity
        shell: pwsh
        env:
          EXPECTED_AUDIT_INTEGRITY: ${{ vars.AUDIT_PACKAGE_INTEGRITY }}
        run: |
          npm ci --ignore-scripts
          npm test
          $npmCli = Join-Path ((npm root --global).Trim()) "npm/bin/npm-cli.js"
          if (-not (Test-Path -LiteralPath $npmCli -PathType Leaf)) { throw "trusted npm CLI not found: $npmCli" }
          "TY_CONTEXT_AUDIT_NPM_CLI=$npmCli" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $packRoot = Join-Path $env:RUNNER_TEMP "audit-pack"
          $installRoot = Join-Path $env:RUNNER_TEMP "audit-install"
          New-Item -ItemType Directory -Force $packRoot, $installRoot | Out-Null
          $name = npm pack --silent --pack-destination $packRoot
          $tarball = Join-Path $packRoot $name.Trim()
          node -e "const fs=require('node:fs'),c=require('node:crypto');const sri='sha512-'+c.createHash('sha512').update(fs.readFileSync(process.argv[1])).digest('base64');if(sri!==process.argv[2])throw new Error('audit package integrity mismatch');" $tarball $env:EXPECTED_AUDIT_INTEGRITY
          Set-Content -Encoding utf8NoBOM (Join-Path $installRoot "package.json") '{"private":true}'
          npm install --prefix $installRoot --ignore-scripts --no-audit --no-fund --package-lock=false $tarball
          if ("${{ matrix.platform }}" -eq "windows") {
            icacls $installRoot /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" "$env:TY_CONTEXT_AUDIT_WINDOWS_USER`:(OI)(CI)RX" /T /C | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "failed to protect installed audit package" }
          }
          "AUDIT_CLI=$(Join-Path $installRoot 'node_modules/project-tiny-context-harness-audit/src/cli.mjs')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Download and bind candidate tarball to the checked commit
        shell: pwsh
        env:
          CANDIDATE_URL: ${{ inputs.candidate_url }}
          CANDIDATE_SHA256: ${{ inputs.candidate_sha256 }}
        run: |
          $candidate = Join-Path $env:RUNNER_TEMP "candidate.tgz"
          node -e "const fs=require('node:fs');fetch(process.argv[1]).then(r=>{if(!r.ok)throw new Error('candidate download '+r.status);return r.arrayBuffer()}).then(b=>fs.writeFileSync(process.argv[2],Buffer.from(b)))" $env:CANDIDATE_URL $candidate
          node -e "const fs=require('node:fs'),c=require('node:crypto');const actual=c.createHash('sha256').update(fs.readFileSync(process.argv[1])).digest('hex');if(actual!==process.argv[2])throw new Error('candidate sha256 mismatch');" $candidate $env:CANDIDATE_SHA256
          if ("${{ matrix.platform }}" -eq "linux") {
            sudo chown root:root $candidate
            sudo chmod 600 $candidate
          } else {
            icacls $candidate /inheritance:r /grant:r "*S-1-5-18:F" "*S-1-5-32-544:F" | Out-Null
          }
          $repack = Join-Path $env:RUNNER_TEMP "candidate-repack"
          New-Item -ItemType Directory -Force $repack | Out-Null
          if ("${{ matrix.platform }}" -eq "linux") {
            sudo --preserve-env=TY_CONTEXT_AUDIT_CANDIDATE_UID,TY_CONTEXT_AUDIT_CANDIDATE_GID,PATH,GITHUB_ACTIONS node $env:AUDIT_CLI --bind-candidate-artifact $candidate --candidate-source (Resolve-Path candidate-source) --candidate-sha256 $env:CANDIDATE_SHA256 --output-dir $repack --npm-cli $env:TY_CONTEXT_AUDIT_NPM_CLI
          } else {
            node $env:AUDIT_CLI --bind-candidate-artifact $candidate --candidate-source (Resolve-Path candidate-source) --candidate-sha256 $env:CANDIDATE_SHA256 --output-dir $repack --npm-cli $env:TY_CONTEXT_AUDIT_NPM_CLI
          }
          "CANDIDATE_TARBALL=$candidate" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Build exact-commit candidate Host binaries
        shell: pwsh
        run: |
          $manifest = Resolve-Path "candidate-source/host/ty-context-host-helper/Cargo.toml"
          $cargoHome = Join-Path $env:RUNNER_TEMP "candidate-cargo-home"
          New-Item -ItemType Directory -Force $cargoHome | Out-Null
          $env:CARGO_HOME = $cargoHome
          cargo fetch --locked --target $env:HOST_BUILD_TARGET --manifest-path $manifest
          $cargoBin = $env:TY_CONTEXT_AUDIT_CARGO_BIN
          $rustupHome = (rustup show home).Trim()
          if ($IsLinux) {
            $candidateOwner = $env:TY_CONTEXT_AUDIT_CANDIDATE_UID + ":" + $env:TY_CONTEXT_AUDIT_CANDIDATE_GID
            sudo chown -R $candidateOwner $cargoHome
            sudo chmod -R a+rX $rustupHome (Split-Path $cargoBin -Parent)
            $env:RUSTUP_HOME = $rustupHome
            $env:CARGO_NET_OFFLINE = "true"
            sudo --preserve-env=TY_CONTEXT_AUDIT_CANDIDATE_UID,TY_CONTEXT_AUDIT_CANDIDATE_GID,PATH,RUSTUP_HOME,CARGO_HOME,CARGO_NET_OFFLINE,GITHUB_ACTIONS node $env:AUDIT_CLI --build-host-candidate (Resolve-Path candidate-source) --cargo-bin $cargoBin --target $env:HOST_BUILD_TARGET
          } else {
            $modifyGrant = $env:TY_CONTEXT_AUDIT_WINDOWS_USER + ":(OI)(CI)M"
            $readGrant = $env:TY_CONTEXT_AUDIT_WINDOWS_USER + ":(OI)(CI)RX"
            icacls $cargoHome /grant:r $modifyGrant /T /C | Out-Null
            icacls $rustupHome /grant:r $readGrant /T /C | Out-Null
            icacls (Split-Path $cargoBin -Parent) /grant:r $readGrant /T /C /L | Out-Null
            $env:RUSTUP_HOME = $rustupHome
            $env:CARGO_NET_OFFLINE = "true"
            node $env:AUDIT_CLI --build-host-candidate (Resolve-Path candidate-source) --cargo-bin $cargoBin --target $env:HOST_BUILD_TARGET
          }
          $release = Resolve-Path "candidate-source/host/ty-context-host-helper/target/$env:HOST_BUILD_TARGET/release"
          "TY_CONTEXT_HOST_HELPER_BIN=$(Join-Path $release 'ty-context-host-helper${{ matrix.binary_suffix }}')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TY_CONTEXT_HOST_ADMIN_BIN=$(Join-Path $release 'ty-context-host-admin${{ matrix.binary_suffix }}')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "TY_CONTEXT_HOST_INSTALLER_UI_BIN=$(Join-Path $release 'ty-context-host-installer-ui${{ matrix.binary_suffix }}')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Download, verify, and bind the pre-signed Host release
        shell: pwsh
        env:
          HOST_RELEASE_URL: ${{ matrix.platform == 'linux' && inputs.linux_host_release_url || inputs.windows_host_release_url }}
          HOST_RELEASE_SHA256: ${{ matrix.platform == 'linux' && inputs.linux_host_release_sha256 || inputs.windows_host_release_sha256 }}
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "host-release-${{ matrix.platform }}.tgz"
          node -e "const fs=require('node:fs');fetch(process.argv[1]).then(r=>{if(!r.ok)throw new Error('host release download '+r.status);return r.arrayBuffer()}).then(b=>fs.writeFileSync(process.argv[2],Buffer.from(b)))" $env:HOST_RELEASE_URL $archive
          node $env:AUDIT_CLI --verify-host-release-candidate $archive --host-release-sha256 $env:HOST_RELEASE_SHA256 --candidate-source (Resolve-Path candidate-source) --helper $env:TY_CONTEXT_HOST_HELPER_BIN --admin $env:TY_CONTEXT_HOST_ADMIN_BIN --installer-ui $env:TY_CONTEXT_HOST_INSTALLER_UI_BIN
          if ($IsLinux) {
            sudo chown root:root $archive
            sudo chmod 600 $archive
          } else {
            icacls $archive /inheritance:r /grant:r "*S-1-5-18:F" "*S-1-5-32-544:F" | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "failed to protect Host release archive" }
          }
          "HOST_RELEASE_ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "HOST_RELEASE_SHA256=$env:HOST_RELEASE_SHA256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Generate disposable provisional result key
        shell: pwsh
        run: |
          node -e "const fs=require('node:fs'),c=require('node:crypto'),p=require('node:path');const {privateKey,publicKey}=c.generateKeyPairSync('ed25519');const file=p.join(process.env.RUNNER_TEMP,'provisional-private.pem');fs.writeFileSync(file,privateKey.export({type:'pkcs8',format:'pem'}),{mode:0o600});const id=c.createHash('sha256').update(publicKey.export({type:'spki',format:'der'})).digest('hex');fs.appendFileSync(process.env.GITHUB_ENV,'PROVISIONAL_AUDIT_KEY='+file+'\nPROVISIONAL_AUDIT_KEY_ID='+id+'\n');"
          $resultRoot = Join-Path $env:RUNNER_TEMP "audit-result"
          New-Item -ItemType Directory -Force $resultRoot | Out-Null
          if ("${{ matrix.platform }}" -eq "windows") {
            icacls (Join-Path $env:RUNNER_TEMP "provisional-private.pem") /inheritance:r /grant:r "*S-1-5-18:F" "*S-1-5-32-544:F" | Out-Null
            icacls $resultRoot /inheritance:r /grant:r "*S-1-5-18:(OI)(CI)F" "*S-1-5-32-544:(OI)(CI)F" | Out-Null
          } else {
            chmod 600 (Join-Path $env:RUNNER_TEMP "provisional-private.pem")
            chmod 700 $resultRoot
          }
          "AUDIT_RESULT_PATH=$(Join-Path $resultRoot 'external-audit-result-${{ matrix.platform }}.json')" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Run exact installed audit package on Linux
        if: matrix.platform == 'linux'
        shell: bash
        env:
          AUDIT_PACKAGE_INTEGRITY: ${{ vars.AUDIT_PACKAGE_INTEGRITY }}
        run: |
          node_bin=$(readlink -f "$(command -v node)")
          node_root=$(cd "$(dirname "$node_bin")/.." && pwd)
          docker run --rm --privileged \
            --volume "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            --volume "$RUNNER_TEMP:$RUNNER_TEMP" \
            --volume "$node_root:$node_root:ro" \
            --workdir "$GITHUB_WORKSPACE" \
            --env "NODE_ROOT=$node_root" \
            --env GITHUB_WORKSPACE \
            --env RUNNER_TEMP \
            --env AUDIT_CLI \
            --env CANDIDATE_TARBALL \
            --env PROVISIONAL_AUDIT_KEY \
            --env PROVISIONAL_AUDIT_KEY_ID \
            --env AUDIT_PACKAGE_INTEGRITY \
            --env HOST_RELEASE_ARCHIVE \
            --env HOST_RELEASE_SHA256 \
            --env AUDIT_RESULT_PATH \
            --env TY_CONTEXT_AUDIT_CANDIDATE_UID \
            --env TY_CONTEXT_AUDIT_CANDIDATE_GID \
            --env CI=1 \
            --env GITHUB_ACTIONS=true \
            --env HTTP_PROXY \
            --env HTTPS_PROXY \
            --env NO_PROXY \
            ubuntu:24.04@sha256:4fbb8e6a8395de5a7550b33509421a2bafbc0aab6c06ba2cef9ebffbc7092d90 \
            bash -euo pipefail -c '
              export PATH="$NODE_ROOT/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              apt-get update -qq
              apt-get install -y -qq bubblewrap ca-certificates git
              "$NODE_ROOT/bin/npx" --yes playwright@1.61.1 install-deps chromium
              git config --global --add safe.directory "$GITHUB_WORKSPACE"
              "$NODE_ROOT/bin/node" "$AUDIT_CLI" \
                --candidate "$CANDIDATE_TARBALL" \
                --candidate-sha256 "${{ inputs.candidate_sha256 }}" \
                --host-release "$HOST_RELEASE_ARCHIVE" \
                --host-release-sha256 "$HOST_RELEASE_SHA256" \
                --audit-integrity "$AUDIT_PACKAGE_INTEGRITY" \
                --signing-key "$PROVISIONAL_AUDIT_KEY" \
                --signing-key-id "$PROVISIONAL_AUDIT_KEY_ID" \
                --result "$AUDIT_RESULT_PATH"
            '
      - name: Run exact installed audit package on Windows
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          AUDIT_PACKAGE_INTEGRITY: ${{ vars.AUDIT_PACKAGE_INTEGRITY }}
        run: |
          node $env:AUDIT_CLI --candidate $env:CANDIDATE_TARBALL --candidate-sha256 "${{ inputs.candidate_sha256 }}" --host-release $env:HOST_RELEASE_ARCHIVE --host-release-sha256 $env:HOST_RELEASE_SHA256 --audit-integrity $env:AUDIT_PACKAGE_INTEGRITY --signing-key $env:PROVISIONAL_AUDIT_KEY --signing-key-id $env:PROVISIONAL_AUDIT_KEY_ID --result $env:AUDIT_RESULT_PATH
      - uses: actions/upload-artifact@v4
        with:
          name: raw-external-audit-result-${{ matrix.platform }}
          path: ${{ runner.temp }}/audit-result/external-audit-result-${{ matrix.platform }}.json
          if-no-files-found: error
      - name: Remove temporary Windows candidate identity
        if: ${{ always() && matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          $user = Get-LocalUser -Name tycontextaudit -ErrorAction SilentlyContinue
          if ($null -ne $user) { Remove-LocalUser -Name tycontextaudit }
      - name: Remove temporary Linux candidate identity
        if: ${{ always() && matrix.platform == 'linux' }}
        shell: bash
        run: |
          if id tycontextaudit >/dev/null 2>&1; then
            sudo pkill -KILL -u "$(id -u tycontextaudit)" 2>/dev/null || true
            sudo userdel --force tycontextaudit
          fi

  sign:
    name: sign-independent-results
    needs: audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          pattern: raw-external-audit-result-*
          path: ${{ runner.temp }}/raw
          merge-multiple: true
      - name: Install exact audit package
        shell: bash
        env:
          EXPECTED_AUDIT_INTEGRITY: ${{ vars.AUDIT_PACKAGE_INTEGRITY }}
        run: |
          npm ci --ignore-scripts
          npm test
          mkdir -p "$RUNNER_TEMP/audit-pack" "$RUNNER_TEMP/audit-install"
          name=$(npm pack --silent --pack-destination "$RUNNER_TEMP/audit-pack")
          tarball="$RUNNER_TEMP/audit-pack/$name"
          node -e 'const fs=require("node:fs"),c=require("node:crypto");const sri="sha512-"+c.createHash("sha512").update(fs.readFileSync(process.argv[1])).digest("base64");if(sri!==process.argv[2])throw new Error("audit package integrity mismatch")' "$tarball" "$EXPECTED_AUDIT_INTEGRITY"
          printf '{"private":true}\n' > "$RUNNER_TEMP/audit-install/package.json"
          npm install --prefix "$RUNNER_TEMP/audit-install" --ignore-scripts --no-audit --no-fund --package-lock=false "$tarball"
          echo "AUDIT_CLI=$RUNNER_TEMP/audit-install/node_modules/project-tiny-context-harness-audit/src/cli.mjs" >> "$GITHUB_ENV"
      - name: Materialize signer key outside candidate jobs
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TY_CONTEXT_EXTERNAL_AUDIT_SIGNING_KEY }}
        run: |
          node -e 'require("node:fs").writeFileSync(process.argv[1],process.env.SIGNING_KEY)' "$RUNNER_TEMP/external-audit-private.pem"
          chmod 600 "$RUNNER_TEMP/external-audit-private.pem"
      - name: Validate full results and apply durable signatures
        shell: bash
        env:
          AUDIT_PACKAGE_INTEGRITY: ${{ vars.AUDIT_PACKAGE_INTEGRITY }}
          AUDIT_SIGNING_KEY_ID: ${{ vars.AUDIT_SIGNING_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/signed"
          for platform in linux windows; do
            if [ "$platform" = linux ]; then host_sha='${{ inputs.linux_host_release_sha256 }}'; else host_sha='${{ inputs.windows_host_release_sha256 }}'; fi
            node "$AUDIT_CLI" \
              --resign-result "$RUNNER_TEMP/raw/external-audit-result-$platform.json" \
              --candidate-sha256 "${{ inputs.candidate_sha256 }}" \
              --host-release-sha256 "$host_sha" \
              --audit-integrity "$AUDIT_PACKAGE_INTEGRITY" \
              --signing-key "$RUNNER_TEMP/external-audit-private.pem" \
              --signing-key-id "$AUDIT_SIGNING_KEY_ID" \
              --result "$RUNNER_TEMP/signed/external-audit-result-$platform.json"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: signed-external-audit-results
          path: ${{ runner.temp }}/signed/*.json
          if-no-files-found: error

  report:
    name: external-long-task-audit
    needs: sign
    runs-on: ubuntu-24.04
    steps:
      - name: Mint restricted check token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.EXTERNAL_AUDIT_APP_ID }}
          private-key: ${{ secrets.EXTERNAL_AUDIT_APP_PRIVATE_KEY }}
          owner: Seven128
          repositories: project-tiny-context-harness
      - name: Post exact-commit required check
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api --method POST repos/Seven128/project-tiny-context-harness/check-runs \
            -f name=external-long-task-audit \
            -f head_sha='${{ inputs.candidate_commit }}' \
            -f status=completed \
            -f conclusion=success \
            -f details_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}' \
